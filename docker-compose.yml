version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sparekart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sparekart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sparekart?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/sparekart?schema=public
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID:-rzp_test_xxxxx}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
